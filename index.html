<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolt-Tracker Workshop</title>
    <style>
        :root { --wolt-blue: #00c2e8; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* עיצוב העיגול סטייל וולט */
        .wolt-circle {
            width: 240px; height: 240px; border-radius: 50%;
            background: conic-gradient(var(--wolt-blue) var(--progress), #e0e0e0 0deg);
            display: flex; align-items: center; justify-content: center;
            margin-top: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.4s ease-out;
        }
        .inner-circle {
            width: 205px; height: 205px; background: white; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .percentage { font-size: 60px; font-weight: 900; color: #333; }
        .label { font-size: 16px; color: #666; margin-top: -5px; }

        /* כרטיסיית משימות */
        .card { background: white; width: 100%; max-width: 450px; border-radius: 25px; padding: 25px; margin-top: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input[type="text"] { flex-grow: 1; padding: 15px; border: 2px solid #f0f0f0; border-radius: 15px; outline: none; transition: 0.3s; font-size: 16px; }
        input[type="text"]:focus { border-color: var(--wolt-blue); }
        button#add-btn { background: var(--wolt-blue); color: white; border: none; padding: 0 25px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        .task-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #f9f9f9; animation: fadeIn 0.3s ease; }
        .task-item:last-child { border-bottom: none; }
        .task-item span { flex-grow: 1; font-size: 18px; color: #444; }
        input[type="checkbox"] { width: 24px; height: 24px; cursor: pointer; margin-left: 15px; accent-color: var(--wolt-blue); }
        .delete-btn { color: #ff4d4d; cursor: pointer; font-size: 14px; margin-right: 15px; border: none; background: none; opacity: 0.6; }
        .delete-btn:hover { opacity: 1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="wolt-circle" id="main-circle" style="--progress: 0deg;">
        <div class="inner-circle">
            <div class="percentage" id="perc-text">0%</div>
            <div class="label">מוכנות הסדנה</div>
        </div>
    </div>

    <div class="card">
        <div class="input-group">
            <input type="text" id="task-input" placeholder="מה צריך להכין?">
            <button id="add-btn">הוספה</button>
        </div>
        <div id="tasks-container">מתחבר לענן...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // המפתחות שלך מהתמונה!
        const firebaseConfig = {
          apiKey: "AIzaSyCmCbbVEjfdycdC5DfluQ0o4jQFrBwznFM",
          authDomain: "myworkshoptracker-90006.firebaseapp.com",
          projectId: "myworkshoptracker-90006",
          storageBucket: "myworkshoptracker-90006.firebasestorage.app",
          messagingSenderId: "694560425735",
          appId: "1:694560425735:web:79305b494e3436e37aa7a2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tasksCol = collection(db, "tasks");

        const container = document.getElementById('tasks-container');
        const input = document.getElementById('task-input');
        const addBtn = document.getElementById('add-btn');

        // האזנה לנתונים
        const q = query(tasksCol, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            let tasks = [];
            snapshot.forEach(doc => tasks.push({ id: doc.id, ...doc.data() }));
            render(tasks);
        });

        async function addTask() {
            if (input.value.trim() === "") return;
            await addDoc(tasksCol, { text: input.value, done: false, createdAt: Date.now() });
            input.value = "";
        }

        window.toggleTask = async (id, currentStatus) => {
            await updateDoc(doc(db, "tasks", id), { done: !currentStatus });
        };

        window.deleteTask = async (id) => {
            if(confirm("למחוק משימה זו?")) await deleteDoc(doc(db, "tasks", id));
        };

        function render(tasks) {
            container.innerHTML = '';
            let doneCount = 0;
            
            tasks.forEach(task => {
                if(task.done) doneCount++;
                const div = document.createElement('div');
                div.className = 'task-item';
                div.innerHTML = `
                    <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask('${task.id}', ${task.done})">
                    <span style="${task.done ? 'text-decoration: line-through; color: #bbb;' : ''}">${task.text}</span>
                    <button class="delete-btn" onclick="deleteTask('${task.id}')">מחיקה</button>
                `;
                container.appendChild(div);
            });

            const percent = tasks.length === 0 ? 0 : Math.round((doneCount / tasks.length) * 100);
            document.getElementById('perc-text').innerText = percent + '%';
            document.getElementById('main-circle').style.setProperty('--progress', (percent * 3.6) + 'deg');
        }

        addBtn.addEventListener('click', addTask);
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') addTask(); });

    </script>
</body>
</html>
