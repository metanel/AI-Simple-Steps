<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Simple Progress | הדרך שלך להצלחה</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --wolt-blue: #00c2e8; --bg: #f4f7f9; }
        body { font-family: 'Assistant', 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 0; margin: 0; min-height: 100vh; color: #2d3436; }

        .brand-header { width: 100%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); position: sticky; top: 0; padding: 15px 0; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); z-index: 100; }
        .brand-name { font-size: 22px; font-weight: 800; color: var(--wolt-blue); }
        .brand-icon { font-size: 24px; margin-right: 10px; }
        .logout-btn { position: absolute; left: 20px; background: none; border: 1px solid var(--wolt-blue); color: var(--wolt-blue); border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 14px; display: none; transition: 0.2s; }
        .logout-btn:hover { background: var(--wolt-blue); color: white; }

        /* מסך כניסה */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; padding: 20px; width: 100%; box-sizing: border-box; }
        .login-card { background: white; padding: 40px 30px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 380px; text-align: center; border: 1px solid rgba(0,194,232,0.1); }
        .login-btn { background: white; color: #444; border: 1px solid #ddd; width: 100%; padding: 15px; border-radius: 18px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.2s; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .login-btn:hover { background: #f8fafc; }
        .login-btn:active { transform: scale(0.98); }

        /* מסך הטרקר */
        #tracker-screen { display: none; flex-direction: column; align-items: center; width: 100%; padding-bottom: 50px; }

        .wolt-circle { width: 260px; height: 260px; border-radius: 50%; background: conic-gradient(var(--wolt-blue) var(--progress), #e2e8f0 0deg); display: flex; align-items: center; justify-content: center; margin-top: 40px; box-shadow: 0 15px 35px rgba(0,194,232,0.2); transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .inner-circle { width: 220px; height: 220px; background: white; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .percentage { font-size: 65px; font-weight: 900; color: #2d3436; }
        .status-msg { font-size: 14px; color: #636e72; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); width: 90%; max-width: 500px; border-radius: 35px; padding: 30px; margin-top: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid white; box-sizing: border-box; }
        .user-welcome { text-align: center; margin-bottom: 25px; color: #2d3436; font-weight: 700; font-size: 20px; }

        .input-group { display: flex; gap: 12px; margin-bottom: 25px; }
        #task-input { flex-grow: 1; padding: 15px; border: 1px solid #edf2f7; border-radius: 20px; font-size: 16px; outline: none; background: #f8fafc; }
        #add-btn { background: #2d3436; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: 700; }

        .task-item { display: flex; align-items: center; padding: 18px 0; border-bottom: 1px solid #f1f5f9; animation: slideUp 0.4s ease; }
        .task-item:last-child { border-bottom: none; }
        .task-item span { flex-grow: 1; font-size: 16px; color: #444; line-height: 1.5; font-weight: 500; }
        .task-item input { width: 24px; height: 24px; cursor: pointer; margin-left: 18px; accent-color: var(--wolt-blue); }
        .delete-btn { color: #fab1a0; cursor: pointer; font-size: 12px; margin-right: 15px; border: none; background: none; transition: 0.2s; }
        .delete-btn:hover { color: #ff7675; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="brand-header">
        <span class="brand-icon">✨</span>
        <span class="brand-name">AI זה פשוט</span>
        <button id="logout-btn" class="logout-btn">התנתק</button>
    </div>

    <div id="login-screen">
        <div class="login-card">
            <h2>איזה כיף שבאת! 👋</h2>
            <p style="color:#636e72; margin-bottom:30px;">התחבר כדי לשמור את ההתקדמות שלך</p>
            <button id="login-go" class="login-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
                התחברות מהירה עם Google
            </button>
        </div>
    </div>

    <div id="tracker-screen">
        <div class="wolt-circle" id="main-circle" style="--progress: 0deg;">
            <div class="inner-circle">
                <div class="percentage" id="perc-text">0%</div>
                <div id="status-label" class="status-msg">טוען...</div>
            </div>
        </div>

        <div class="card">
            <div id="user-display" class="user-welcome"></div>
            <div class="input-group">
                <input type="text" id="task-input" placeholder="להוסיף משימה אישית?">
                <button id="add-btn">הוספה</button>
            </div>
            <div id="tasks-container">טוען את תוכנית העבודה שלך...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCmCbbVEjfdycdC5DfluQ0o4jQFrBwznFM",
          authDomain: "myworkshoptracker-90006.firebaseapp.com",
          projectId: "myworkshoptracker-90006",
          storageBucket: "myworkshoptracker-90006.firebasestorage.app",
          messagingSenderId: "694560425735",
          appId: "1:694560425735:web:79305b494e3436e37aa7a2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const tasksCol = collection(db, "tasks");

        let currentUid = null;
        let unsubscribeSnapshot = null;

        const loginScreen = document.getElementById('login-screen');
        const trackerScreen = document.getElementById('tracker-screen');
        const loginBtn = document.getElementById('login-go');
        const logoutBtn = document.getElementById('logout-btn');
        const userDisplay = document.getElementById('user-display');

        // לחיצה על כפתור התחברות
        loginBtn.onclick = () => {
            signInWithPopup(auth, provider).catch(err => {
                console.error("שגיאת התחברות:", err);
                alert("הייתה בעיה בהתחברות, נסה שוב.");
            });
        };

        // לחיצה על התנתקות
        logoutBtn.onclick = () => signOut(auth);

        // האזנה למצב המשתמש - מחובר או מנותק
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUid = user.uid; 
                loginScreen.style.display = 'none';
                trackerScreen.style.display = 'flex';
                logoutBtn.style.display = 'block';
                userDisplay.innerText = `ההתקדמות של ${user.displayName.split(' ')[0]}`; // מציג שם פרטי
                
                // מנקה את שורת הכתובת אם נשאר בה פרמטר ישן
                window.history.replaceState({}, document.title, window.location.pathname);
                
                initTracker(currentUid);
            } else {
                currentUid = null;
                loginScreen.style.display = 'flex';
                trackerScreen.style.display = 'none';
                logoutBtn.style.display = 'none';
                if (unsubscribeSnapshot) unsubscribeSnapshot();
            }
        });

        function initTracker(uid) {
            const defaultTasks = [
                "הגדרת קהל יעד (בעזרת ChatGPT)", "בחירת שם וקניית דומיין", "מיתוג ולוגו (בעזרת Canva AI)",
                "כתיבת תוכן לדף נחיתה", "בניית דף הנחיתה באוויר", "חיבור סליקה",
                "אוטומציית מייל/וואטסאפ ברוך הבא", "חיבור הלידים ל-CRM (גוגל שיטס)",
                "יצירת תוכנית תוכן ל-30 יום", "צילום והעלאת 3 סרטוני רילס", "וובינר או סדנת השקה"
            ];

            async function checkNew() {
                const qCheck = query(tasksCol, where("userId", "==", uid));
                const snap = await getDocs(qCheck);
                if (snap.empty) {
                    for (let i = 0; i < defaultTasks.length; i++) {
                        await addDoc(tasksCol, { 
                            text: defaultTasks[i], 
                            done: false, 
                            createdAt: Date.now() - (i*1000), 
                            userId: uid 
                        });
                    }
                }
            }

            if (unsubscribeSnapshot) unsubscribeSnapshot();
            unsubscribeSnapshot = onSnapshot(query(tasksCol, where("userId", "==", uid), orderBy("createdAt", "asc")), (snapshot) => {
                let tasks = [];
                snapshot.forEach(doc => tasks.push({ id: doc.id, ...doc.data() }));
                render(tasks);
            });

            const addTask = async () => {
                const input = document.getElementById('task-input');
                if (input.value.trim()) {
                    await addDoc(tasksCol, { text: input.value, done: false, createdAt: Date.now(), userId: uid });
                    input.value = "";
                }
            };
            document.getElementById('add-btn').onclick = addTask;
            document.getElementById('task-input').onkeypress = (e) => { if(e.key === 'Enter') addTask(); };

            window.toggleTask = async (id, status) => { await updateDoc(doc(db, "tasks", id), { done: !status }); };
            window.deleteTask = async (id) => { if(confirm("למחוק משימה זו מהמסלול?")) await deleteDoc(doc(db, "tasks", id)); };

            let lastPercent = -1;
            function render(tasks) {
                const container = document.getElementById('tasks-container');
                container.innerHTML = '';
                let done = 0;
                tasks.forEach(t => {
                    if(t.done) done++;
                    const div = document.createElement('div');
                    div.className = 'task-item';
                    div.innerHTML = `<input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask('${t.id}', ${t.done})">
                        <span style="${t.done ? 'text-decoration: line-through; color: #b2bec3;' : ''}">${t.text}</span>
                        <button class="delete-btn" onclick="deleteTask('${t.id}')">מחק</button>`;
                    container.appendChild(div);
                });

                const percent = tasks.length ? Math.round((done/tasks.length)*100) : 0;
                document.getElementById('perc-text').innerText = percent + '%';
                document.getElementById('main-circle').style.setProperty('--progress', (percent * 3.6) + 'deg');
                
                const label = document.getElementById('status-label');
                if(percent === 0) label.innerText = "יוצאים לדרך! 🚀";
                else if(percent < 50) label.innerText = "התחלה מעולה! ✨";
                else if(percent < 100) label.innerText = "כמעט שם... 🔥";
                else {
                    label.innerText = "העסק באוויר! 🎉";
                    if(lastPercent !== -1 && lastPercent < 100) {
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00c2e8', '#2d3436', '#ffffff'] });
                    }
                }
                lastPercent = percent;
            }
            checkNew();
        }
    </script>
</body>
</html>
